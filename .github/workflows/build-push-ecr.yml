name: Build and Push to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/mern-backend:latest
            ${{ env.ECR_REGISTRY }}/mern-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/mern-frontend:latest
            ${{ env.ECR_REGISTRY }}/mern-frontend:${{ github.sha }}

      - name: Summary
        run: |
          echo "### Images pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ env.ECR_REGISTRY }}/mern-backend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ env.ECR_REGISTRY }}/mern-frontend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
