name: Deploy Monitoring Stack

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'k8s/monitoring/**'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  deploy-monitoring:
    name: Deploy Prometheus & Grafana
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy monitoring namespace and Prometheus
        run: |
          kubectl apply -f k8s/monitoring/namespace.yaml
          kubectl apply -f k8s/monitoring/prometheus-configmap.yaml
          kubectl apply -f k8s/monitoring/prometheus-deployment.yaml

      - name: Deploy Grafana
        run: |
          kubectl apply -f k8s/monitoring/grafana-deployment.yaml
          kubectl apply -f k8s/monitoring/grafana-ingress.yaml

      - name: Wait for monitoring pods
        run: |
          kubectl rollout status deployment/prometheus -n monitoring --timeout=120s
          kubectl rollout status deployment/grafana -n monitoring --timeout=120s

      - name: Get Grafana endpoint
        run: |
          echo "### Monitoring stack deployed" >> $GITHUB_STEP_SUMMARY
          ALB=$(kubectl get ingress grafana-ingress -n monitoring -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "Grafana URL: http://$ALB/grafana (admin / changeme)" >> $GITHUB_STEP_SUMMARY
          echo "> **Change the Grafana password immediately after first login.**" >> $GITHUB_STEP_SUMMARY
